id: T5
name: Cryptographically Relevant Quantum Computer Breaks Signature Suites
elements: [P3, P5, O2, E1]
tags: [security]
taxonomyName: STRIDE
taxonomyClass: Tampering
description: >-
  Every currently registered Data Integrity [=cryptosuite=] (ECDSA over the
  P-256 and P-384 curves, EdDSA over Ed25519, and BBS over BLS12-381)
  inherits its security from the hardness of elliptic-curve discrete
  logarithms. A cryptographically relevant quantum computer (CRQC) running
  Shor's algorithm would recover private keys from public keys, allowing an
  attacker to perform the [=P3|sign=] process for any [=E1|signer=] whose
  public key it has observed and to forge [=O2|signed documents=] that
  [=P5|verify=] as authentic. This collapses the mitigation on which the
  tamper-detection guarantee of this specification rests (see T1), and it
  applies retroactively: documents signed before migration become forgeable
  the moment the capability exists, even though the hash functions used by
  the [=P2|hash=] process are not practically broken by known quantum
  algorithms.
response:
  - id: R13
    name: Cryptographic Agility
    type: Reduce
    description: >-
      The [=cryptosuite=] architecture separates the proof from the document
      it protects and identifies the suite in every proof, so deployments
      that remain connected can migrate to a post-quantum signature suite
      through a configuration change once one is standardized. Post-quantum
      Data Integrity [=cryptosuites=] based on NIST-standardized algorithms,
      such as ML-DSA, are under active incubation. Agility enables
      migration for newly created proofs; it does nothing for documents
      that cannot be re-issued.
  - id: R14
    name: Cryptographic Layering via Proof Sets
    type: Reduce
    description: >-
      Because a [=O2|signed document=] can carry a proof set, [=E1|signers=]
      of long-lived documents layer proofs from independent [=cryptosuites=]
      (for example, a classical suite alongside a post-quantum suite during
      the migration period) so that the compromise of one algorithm family
      leaves the other proof intact. The residual risk is retroactive
      forgery: proofs created before layering or migration become forgeable
      once a CRQC exists, and only re-issuance of those documents, together
      with verifier-side deprecation of broken suites, addresses the legacy
      population.
  - id: R15
    name: Date-Versioned Cryptosuite Names
    type: Reduce
    description: >-
      [=Cryptosuite=] identifiers embed their year of design
      (<code>eddsa-rdfc-2022</code>, <code>ecdsa-rdfc-2019</code>,
      <code>bbs-2023</code>), giving developers and auditors an immediate,
      human-readable signal of cryptographic age. Aging identifiers prompt
      the periodic review, upgrade, and deprecation decisions on which
      timely migration away from broken algorithms depends.
