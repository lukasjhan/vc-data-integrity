id: T3
name: Signing Key Compromise via Inadequate Key Protection
elements: [S1, C1, P3, E1, P5]
tags: [security]
taxonomyName: STRIDE
taxonomyClass: Spoofing
description: >-
  A [=C1|signing system=] is deployed with its private signing keys
  inadequately protected: key material is stored in application memory or
  on disk instead of in a [=S1|security module=], keys remain in service
  far beyond recommended cryptoperiods, or a single key is reused across
  unrelated purposes such as both credential issuance and authentication.
  An attacker who obtains the key material can run the [=P3|sign=] process
  at will, producing proofs that are indistinguishable from those created
  by the legitimate [=E1|signer=]. The root event is a disclosure of the
  contents of the [=S1|security module=]; the realized harm is the attacker
  spoofing the [=E1|signer=]'s signing authority. Every document that a
  [=P5|verifier=] checks against the compromised key is affected until the
  compromise is discovered and the key is rotated.
response:
  - id: R6
    name: Security Module Key Storage
    type: Reduce
    description: >-
      Deployments generate and store signing keys inside a dedicated
      [=S1|security module=] (such as a hardware security module, a trusted
      platform module, or an operating-system keystore) that performs the
      [=P3|sign=] operation internally and never releases private key
      material to application code. This substantially raises the cost of
      key exfiltration, although it does not prevent an attacker who
      controls the [=C1|signing system=] from misusing the module to sign
      attacker-chosen documents while that access persists.
  - id: R7
    name: Cryptoperiods and Key Rotation
    type: Reduce
    description: >-
      Deployments bound the lifetime of signing keys following
      key-management guidance such as NIST SP 800-57, which recommends
      cryptoperiods of one to three years for signing keys, and rotate keys
      on schedule and immediately upon suspicion of compromise. Bounded
      cryptoperiods limit the window during which a compromised key can
      produce proofs that [=E3|verifiers=] trust.
  - id: R8
    name: Verification Relationship and Proof Purpose Validation
    type: Reduce
    description: >-
      The Data Integrity specification requires that a verification method
      be expressed under the verification relationship that matches a
      proof's declared <code>proofPurpose</code>, and that the [=P5|verify=]
      process confirm both the binding between the verification method and
      its controller and the match between the proof's purpose and the
      purpose the [=E3|verifier=] expects. Keys deployed for a single
      purpose therefore cannot be silently repurposed for another, which
      contains the blast radius of any single key compromise.
